<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pakua Video za TikTok & Facebook Bila Watermark</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #f0f4f8, #d9e2ec);
      margin: 0;
      padding: 20px;
      color: #333;
    }
    .container {
      max-width: 600px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 {
      color: #e91e63;
    }
    input[type="text"] {
      width: 100%;
      padding: 14px;
      margin: 20px 0;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      background: #e91e63;
      color: white;
      border: none;
      padding: 14px 30px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #c2185b;
    }
    #result {
      margin-top: 25px;
      font-size: 18px;
      color: #333;
    }
    .note {
      font-size: 14px;
      color: #777;
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Pakua Video Bila Watermark</h1>
    <p>Wewe weka link ya TikTok au Facebook video hapa chini:</p>

    <input type="text" id="urlInput" placeholder="https://www.tiktok.com/@user/video/12345..." />

    <button onclick="pakuaVideo()">Pakua Sasa</button>

    <div id="result"></div>

    <div class="note">
      Huduma hii inatumia tovuti za watu wengine (kama ssstik/snaptik). Ikiwa haifanyi kazi, jaribu kubadilisha huduma au tumia backend yako baadaye.
    </div>
  </div>

  <script>
    function pakuaVideo() {
      const url = document.getElementById('urlInput').value.trim();
      const resultDiv = document.getElementById('result');

      if (!url) {
        resultDiv.innerHTML = "<p style='color:red;'>Tafadhali weka link halali!</p>";
        return;
      }

      resultDiv.innerHTML = "<p>Inajaribu kupakua... Subiri kidogo...</p>";

      // Chaguo za huduma zinazoweza kufanya kazi 2026 (jaribu moja moja)
      const huduma = [
        `https://ssstik.io/abc?url=${encodeURIComponent(url)}`,           // ssstik (TikTok + FB mara nyingi)
        `https://snaptik.app/abc?url=${encodeURIComponent(url)}`,         // snaptik
        `https://musicaldown.com/download?url=${encodeURIComponent(url)}`, // musicaldown
        `https://tikmate.cc/download?url=${encodeURIComponent(url)}`      // tikmate
      ];

      // Fungua moja kwa moja (unaweza kuchagua moja tu au kutoa chaguo)
      // Hapa tunaanza na ssstik kama default
      window.open(huduma[0], '_blank');

      resultDiv.innerHTML = `
        <p>Ikiwa haikufunguka vizuri au ina watermark:</p>
        <ul style="text-align:left; margin:20px auto; max-width:400px;">
          <li>Jaribu moja ya link hizi moja kwa moja:</li>
          \( {huduma.map(h => `<li><a href=" \){h}" target="_blank">${h.split('/')[2]}</a></li>`).join('')}
        </ul>
        <p au tumia programu ya yt-dlp kwa ubora bora zaidi.</p>
      `;
    }
  </script>

</body>
</html>
