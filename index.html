<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Website Title</title>
  
  <!-- Basic meta tags (good for SEO & social sharing) -->
  <meta name="description" content="A modern website built in 2026">
  <meta name="author" content="Boydn">
  
  <!-- Open Graph / Social media preview -->
  <meta property="og:title" content="Your Cool Website">
  <meta property="og:description" content="Something interesting is happening here...">
  <meta property="og:image" content="https://your-site.com/og-image.jpg">
  <meta property="og:url" content="https://your-site.com">
  
  <!-- Favicon (replace with your own) -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  
  <style>
    :root {
      --primary: #6366f1;       /* indigo-500 */
      --primary-dark: #4f46e5;
      --bg: #0f172a;            /* slate-900 */
      --text: #e2e8f0;
      --text-light: #94a3b8;
      --card: #1e293b;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100dvh;
    }

    header {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(99, 102, 241, 0.12);
      transition: all 0.3s ease;
    }

    nav {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
      text-decoration: none;
    }

    .nav-links a {
      color: var(--text-light);
      text-decoration: none;
      margin-left: 2rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: white;
    }

    main {
      padding-top: 6rem;
    }

    .hero {
      min-height: 90dvh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }

    .hero h1 {
      font-size: clamp(3rem, 8vw, 6.5rem);
      font-weight: 800;
      margin-bottom: 1.5rem;
      background: linear-gradient(90deg, #c084fc, #6366f1, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 0.95;
    }

    .hero p {
      font-size: 1.4rem;
      max-width: 600px;
      margin: 0 auto 2.5rem;
      color: var(--text-light);
    }

    .btn {
      display: inline-block;
      padding: 1rem 2.2rem;
      background: var(--primary);
      color: white;
      text-decoration: none;
      border-radius: 9999px;
      font-weight: 600;
      font-size: 1.1rem;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      background: var(--primary-dark);
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.35);
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--primary);
      color: var(--primary);
    }

    .btn-outline:hover {
      background: var(--primary);
      color: white;
    }

    @media (max-width: 768px) {
      .nav-links {
        display: none; /* → you can add mobile menu later */
      }
    }
  </style>
</head>
<body>

  <header>
    <nav>
      <a href="#" class="logo">Boydn</a>
      <div class="nav-links">
        <a href="#home">Home</a>
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
      </div>
    </nav>
  </header>

  <main>
    <section class="hero" id="home">
      <div>
        <h1>Build Something<br>Amazing Today</h1>
        <p>
          Modern web experiences • Clean code • Fast performance • 
          Made with passion in Dar es Salaam
        </p>
        <div style="margin-top: 2rem; display: flex; gap: 1.5rem; justify-content: center; flex-wrap: wrap;">
          <a href="#" class="btn">Get Started</a>
          <a href="#" class="btn btn-outline">Learn More</a>
        </div>
      </div>
    </section>

    <!-- Add more sections here: about, projects, contact, etc. -->
  </main>

  <script>
    // Optional: simple scroll spy for nav (active link)
    window.addEventListener('scroll', () => {
      const sections = document.querySelectorAll('section[id]');
      const navLinks = document.querySelectorAll('.nav-links a');
      
      let current = '';
      
      sections.forEach(section => {
        const sectionTop = section.offsetTop;
        if (scrollY >= sectionTop - 200) {
          current = section.getAttribute('id');
        }
      });
      
      navLinks.forEach(link => {
        link.classList.remove('active');
        if (link.getAttribute('href') === `#${current}`) {
          link.classList.add('active');
        }
      });
    });
  </script>
</body>
</html>
