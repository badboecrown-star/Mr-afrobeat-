<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pakua Video TikTok & Facebook Bila Watermark - Haraka & Salama</title>
  <meta name="description" content="Pakua video za TikTok na Facebook bila watermark, HD quality, bila kujiandikisha. Rahisi na haraka kwa simu na kompyuta."/>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
      color: #333;
      padding: 20px 15px;
    }
    .container {
      max-width: 580px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .header {
      background: #fe2c55;
      color: white;
      padding: 30px 20px;
      text-align: center;
    }
    .header h1 {
      font-size: 1.9rem;
      margin-bottom: 8px;
    }
    .header p {
      font-size: 1rem;
      opacity: 0.9;
    }
    .main-content {
      padding: 30px 25px;
    }
    .input-group {
      margin-bottom: 25px;
    }
    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #444;
    }
    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #ddd;
      border-radius: 12px;
      font-size: 1rem;
      transition: all 0.3s;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #fe2c55;
      box-shadow: 0 0 0 4px rgba(254,44,85,0.15);
    }
    .platform-tabs {
      display: flex;
      margin-bottom: 20px;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #eee;
    }
    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      background: #f8f9fa;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
    }
    .tab.active {
      background: #fe2c55;
      color: white;
    }
    button {
      width: 100%;
      padding: 16px;
      background: #fe2c55;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
    }
    button:hover {
      background: #e0244d;
      transform: translateY(-2px);
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #result {
      margin-top: 30px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 12px;
      display: none;
    }
    .video-preview {
      max-width: 100%;
      border-radius: 12px;
      margin: 15px 0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .download-btn {
      background: #28a745;
      margin: 10px 0;
    }
    .download-btn:hover {
      background: #218838;
    }
    .loading {
      text-align: center;
      padding: 30px 0;
      color: #666;
      font-style: italic;
    }
    .error {
      color: #dc3545;
      text-align: center;
      margin: 15px 0;
    }
    footer {
      text-align: center;
      margin-top: 40px;
      color: #777;
      font-size: 0.9rem;
    }
    @media (max-width: 500px) {
      .header h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>Pakua Video Haraka</h1>
      <p>TikTok & Facebook bila Watermark • HD • Bila Kujiandikisha</p>
    </div>

    <div class="main-content">
      <div class="platform-tabs">
        <div class="tab active" data-platform="tiktok">TikTok</div>
        <div class="tab" data-platform="facebook">Facebook</div>
      </div>

      <div class="input-group">
        <label id="label">Paste Link ya Video ya TikTok hapa</label>
        <input type="text" id="urlInput" placeholder="https://www.tiktok.com/@user/video/123456789..." autocomplete="off"/>
      </div>

      <button id="downloadBtn">Pakua Video (HD Bila Watermark)</button>

      <div id="result">
        <div id="loading" class="loading" style="display:none;">Inapakia... Subiri sekunde chache</div>
        <div id="error" class="error" style="display:none;"></div>
        
        <div id="preview"></div>
        
        <div id="buttons" style="display:none;">
          <a id="videoDownload" class="download-btn" href="#" download>
            <button class="download-btn">Pakua Video (MP4 HD)</button>
          </a>
